<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6c63ff">
  <meta name="description" content="Suivez vos entraînements, votre poids et votre nutrition">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SportTracker">

  <title>SportTracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="/css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- App Content -->
  <main id="app-content"></main>

  <!-- Bottom Navigation -->
  <nav id="app-nav">
    <div class="nav-item active" data-page="dashboard">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </div>
    <div class="nav-item" data-page="workouts">
      <span class="nav-icon">💪</span>
      <span class="nav-label">Séances</span>
    </div>
    <div class="nav-item" data-page="diet">
      <span class="nav-icon">🥗</span>
      <span class="nav-label">Nutrition</span>
    </div>
    <div class="nav-item" data-page="weight">
      <span class="nav-icon">⚖️</span>
      <span class="nav-label">Poids</span>
    </div>
    <div class="nav-item" data-page="keto">
      <span class="nav-icon">🥑</span>
      <span class="nav-label">Kéto</span>
    </div>
    <div class="nav-item" data-page="profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profil</span>
    </div>
  </nav>

  <!-- Exercise Suggestions Datalist -->
  <datalist id="exercise-suggestions">
    <option value="Squat">
    <option value="Développé couché">
    <option value="Soulevé de terre">
    <option value="Tractions">
    <option value="Dips">
    <option value="Développé militaire">
    <option value="Curl biceps">
    <option value="Extension triceps">
    <option value="Rowing barre">
    <option value="Leg press">
    <option value="Fentes">
    <option value="Hip thrust">
    <option value="Mollets">
    <option value="Gainage">
    <option value="Crunchs">
    <option value="Pompes">
    <option value="Tirage horizontal">
    <option value="Tirage vertical">
    <option value="Écarté couché">
    <option value="Course à pied">
    <option value="Vélo stationnaire">
    <option value="Natation">
    <option value="Corde à sauter">
    <option value="Burpees">
    <option value="Mountain climbers">
    <option value="Jump squats">
    <option value="Kettlebell swing">
    <option value="Planche">
    <option value="Shoulder press haltères">
    <option value="Face pull">
  </datalist>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
